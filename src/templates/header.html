<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="about:blank">
    <META HTTP-EQUIV="CACHE-CONTROL" CONTENT="NO-CACHE">
    {{#refresh}}
        <meta http-equiv="refresh" content="10">
    {{/refresh}}
    <title>{{t_header_title}}</title>
    <!--<link rel="stylesheet" type="text/css" href="/css/style.css">-->
    <style type="text/css">
        {{#css_styles}}{{/css_styles}}
    </style>

</head>
<body class="bg-background">
<div>

    <div class="center glass-panel bg-surface border-primary backdrop-blur-md">
        <h1 class="center xfo-title text-primary"><a href="/?lang={{lang}}">{{t_header_title}}</a></h1>
        <h4 class="subtext" style="font-size: 14px; margin: 0px">{{t_header_tagline}}</h4>
        <h5 class="subtext" style="font-size: 12px; margin: 8px 0 0 0">
            {{t_header_lang_label}}:
            <a href="/?lang=en">EN</a> |
            <a href="/?lang=zh-TW">繁中</a> |
            <a href="/?lang=es">ES</a>
        </h5>
    </div>


    <div class="center glass-panel bg-surface border-primary backdrop-blur-md">
        <form action="/search" method="get" style="width:100%; margin-top:15px" class="style-1">
            <input class="font-mono" type="text" name="value" size="120"
                   placeholder="{{t_header_search_placeholder}}">
            <input type="hidden" name="lang" value="{{lang}}">
            <input type="submit" value="{{t_common_search}}">
        </form>
    </div>

</div>
